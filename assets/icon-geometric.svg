<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg3" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#1e2a4a"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bg3)" stroke="#2a3a5c" stroke-width="2"/>

  <!-- Three concentric arcs representing the three playback modes:
       Outer arc  = Timeline (linear, widest sweep)
       Middle arc = Pattern (medium sweep)
       Inner arc  = Performance (tightest, brightest)
  -->
  <g filter="url(#glow3)" fill="none" stroke-linecap="round">

    <!-- Outer arc — Timeline — wide, pale blue -->
    <path d="M 96,320 A 185,185 0 0,1 416,320"
          stroke="#2a6abf" stroke-width="28" opacity="0.7"/>

    <!-- Middle arc — Pattern — medium, mid blue -->
    <path d="M 128,300 A 145,145 0 0,1 384,300"
          stroke="#3a80df" stroke-width="28" opacity="0.85"/>

    <!-- Inner arc — Performance — tight, bright blue -->
    <path d="M 164,278 A 105,105 0 0,1 348,278"
          stroke="#4a9eff" stroke-width="28" opacity="1.0"/>

    <!-- Vertical accent line tying the three arcs together -->
    <line x1="256" y1="152" x2="256" y2="278"
          stroke="#4a9eff" stroke-width="20" opacity="0.5"/>

    <!-- Top dot -->
    <circle cx="256" cy="140" r="18" fill="#4a9eff" stroke="none"/>

  </g>
</svg>
