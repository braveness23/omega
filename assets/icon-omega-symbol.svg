<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#1e2a4a"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)" stroke="#2a3a5c" stroke-width="2"/>

  <!-- Omega glyph — drawn as a path so it renders without fonts -->
  <!-- The Ω is constructed from two arcs and a flat base with feet -->
  <g filter="url(#glow)">
    <path d="
      M 256 108
      C 163 108 88 183 88 276
      C 88 336 120 388 168 418
      L 148 448
      L 364 448
      L 344 418
      C 392 388 424 336 424 276
      C 424 183 349 108 256 108 Z
      M 256 128
      C 338 128 404 194 404 276
      C 404 330 374 378 330 406
      L 346 432
      L 166 432
      L 182 406
      C 138 378 108 330 108 276
      C 108 194 174 128 256 128 Z
    "
    fill="#4a9eff" opacity="0.95"/>
  </g>

  <!-- Simpler, cleaner Ω using stroke approach -->
  <g transform="translate(256,256)">
    <!-- Main omega arc -->
    <path d="M -120,30 A 130,130 0 1,1 120,30"
          fill="none" stroke="#4a9eff" stroke-width="36"
          stroke-linecap="round" filter="url(#glow)"/>
    <!-- Left foot -->
    <line x1="-148" y1="30" x2="-88" y2="30"
          stroke="#4a9eff" stroke-width="30" stroke-linecap="round"/>
    <!-- Right foot -->
    <line x1="88" y1="30" x2="148" y2="30"
          stroke="#4a9eff" stroke-width="30" stroke-linecap="round"/>
    <!-- Left inner notch -->
    <line x1="-120" y1="30" x2="-80" y2="80"
          stroke="#4a9eff" stroke-width="30" stroke-linecap="round"/>
    <!-- Right inner notch -->
    <line x1="120" y1="30" x2="80" y2="80"
          stroke="#4a9eff" stroke-width="30" stroke-linecap="round"/>
  </g>
</svg>
