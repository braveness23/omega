name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # ── Path filter ───────────────────────────────────────────────────────────────
  # Detects whether any build-relevant files changed.
  # Expensive build jobs depend on this output and skip on docs-only changes.
  # On push-to-main the build always runs regardless (|| github.event_name == 'push').
  filter:
    runs-on: arc-runner-omega
    outputs:
      code: ${{ steps.f.outputs.code }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@v4
        id: f
        with:
          filters: |
            code:
              - 'src/**'
              - 'include/**'
              - 'tests/**'
              - 'CMakeLists.txt'
              - 'CMakePresets.json'
              - 'cmake/**'
              - '.github/workflows/ci.yml'

  # ── Compiler matrix ──────────────────────────────────────────────────────────
  # Linux-only matrix (self-hosted k3s runners). macOS and Windows builds are
  # skipped — add them back with GitHub-hosted runners if needed in future.
  # C++20 jobs are informational (continue-on-error) until C++20 is formally declared.
  build-and-test:
    name: ${{ matrix.compiler }} / C++${{ matrix.std }}
    runs-on: arc-runner-omega
    needs: [filter]
    if: needs.filter.outputs.code == 'true' || github.event_name == 'push'

    strategy:
      fail-fast: false
      matrix:
        include:
          # GCC (minimum: 10) — tested with 12 on Ubuntu 24.04
          - compiler: gcc
            cc: gcc-12
            cxx: g++-12
            std: "17"
            informational: false

          - compiler: gcc
            cc: gcc-12
            cxx: g++-12
            std: "20"
            informational: true

          # Clang (minimum: 14) — tested with 18 on Ubuntu 24.04
          - compiler: clang-18
            cc: clang-18
            cxx: clang++-18
            std: "17"
            informational: false

          - compiler: clang-18
            cc: clang-18
            cxx: clang++-18
            std: "20"
            informational: true

    continue-on-error: ${{ matrix.informational }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache FetchContent dependencies
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.cache/fetchcontent
          key: fetchcontent-${{ matrix.compiler }}-${{ matrix.std }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: fetchcontent-${{ matrix.compiler }}-${{ matrix.std }}-

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_CXX_STANDARD=${{ matrix.std }} \
            -DOMEGA_BUILD_TESTS=ON \
            -DOMEGA_BUILD_EXAMPLES=OFF \
            -DOMEGA_WITH_LINK=OFF \
            -DLIBREMIDI_NO_ALSA=ON \
            "-DFETCHCONTENT_BASE_DIR=$GITHUB_WORKSPACE/.cache/fetchcontent" \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -G Ninja

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure --parallel 4

  # ── ASan + UBSan ─────────────────────────────────────────────────────────────
  sanitizers:
    name: ASan/UBSan (Clang 18)
    runs-on: arc-runner-omega
    needs: [filter]
    if: needs.filter.outputs.code == 'true' || github.event_name == 'push'

    steps:
      - uses: actions/checkout@v6

      - name: Cache FetchContent dependencies
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.cache/fetchcontent
          key: fetchcontent-clang-18-san-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: fetchcontent-clang-18-san-

      - name: Configure
        env:
          CC: clang-18
          CXX: clang++-18
        run: |
          cmake -B build_san \
            -DCMAKE_BUILD_TYPE=Debug \
            -DOMEGA_BUILD_TESTS=ON \
            -DOMEGA_WITH_SANITIZERS=ON \
            -DLIBREMIDI_NO_ALSA=ON \
            -DFETCHCONTENT_BASE_DIR=${{ github.workspace }}/.cache/fetchcontent \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -G Ninja

      - name: Build
        run: cmake --build build_san --parallel

      - name: Test
        env:
          ASAN_OPTIONS: detect_leaks=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: ctest --test-dir build_san --output-on-failure

  # ── ThreadSanitizer ───────────────────────────────────────────────────────────
  tsan:
    name: TSan (Clang 18)
    runs-on: arc-runner-omega
    needs: [filter]
    if: needs.filter.outputs.code == 'true' || github.event_name == 'push'

    steps:
      - uses: actions/checkout@v6

      - name: Cache FetchContent dependencies
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.cache/fetchcontent
          key: fetchcontent-clang-18-tsan-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: fetchcontent-clang-18-tsan-

      - name: Configure
        env:
          CC: clang-18
          CXX: clang++-18
        run: |
          cmake -B build_tsan \
            -DCMAKE_BUILD_TYPE=Debug \
            -DOMEGA_BUILD_TESTS=ON \
            -DOMEGA_WITH_TSAN=ON \
            -DLIBREMIDI_NO_ALSA=ON \
            -DFETCHCONTENT_BASE_DIR=${{ github.workspace }}/.cache/fetchcontent \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -G Ninja

      - name: Build
        run: cmake --build build_tsan --parallel

      - name: Test
        env:
          TSAN_OPTIONS: halt_on_error=1:second_deadlock_stack=1
        run: ctest --test-dir build_tsan --output-on-failure

  # ── clang-format ─────────────────────────────────────────────────────────────
  format-check:
    name: clang-format
    runs-on: arc-runner-omega

    steps:
      - uses: actions/checkout@v6

      - name: Check formatting
        run: |
          find include src tests -name '*.cpp' -o -name '*.h' -o -name '*.hpp' \
            | xargs clang-format-18 --dry-run --Werror

  # ── clang-tidy ───────────────────────────────────────────────────────────────
  clang-tidy:
    name: clang-tidy
    runs-on: arc-runner-omega
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache FetchContent dependencies
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.cache/fetchcontent
          key: fetchcontent-clang-18-tidy-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: fetchcontent-clang-18-tidy-

      - name: Configure (generate compile_commands.json)
        env:
          CC: clang-18
          CXX: clang++-18
        run: |
          cmake -B build_tidy \
            -DCMAKE_BUILD_TYPE=Debug \
            -DOMEGA_BUILD_TESTS=ON \
            -DOMEGA_BUILD_EXAMPLES=ON \
            -DLIBREMIDI_NO_ALSA=ON \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DFETCHCONTENT_BASE_DIR=${{ github.workspace }}/.cache/fetchcontent \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -G Ninja

      - name: Run clang-tidy on changed files
        run: |
          CHANGED=$(git diff --name-only --diff-filter=ACM origin/${{ github.base_ref }}...HEAD \
            | grep -E '\.(cpp|h|hpp)$' || true)
          if [ -z "$CHANGED" ]; then
            echo "No C++ files changed."
            exit 0
          fi
          echo "$CHANGED" | xargs clang-tidy-18 \
            -p build_tidy \
            --warnings-as-errors='*'

  # ── CHANGELOG lint ────────────────────────────────────────────────────────────
  changelog-lint:
    name: CHANGELOG lint
    runs-on: arc-runner-omega
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check CHANGELOG updated
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          if echo "$PR_TITLE" | grep -qE "^(ci|chore|docs):"; then
            echo "Skipping CHANGELOG check for: $PR_TITLE"
            exit 0
          fi
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          if echo "$CHANGED" | grep -q "CHANGELOG.md"; then
            echo "CHANGELOG.md updated."
          else
            echo "Error: CHANGELOG.md not updated for this PR."
            echo "Add an entry under the [Unreleased] section."
            echo "Skip by prefixing your PR title with: ci:, chore:, or docs:"
            exit 1
          fi

  # ── ABI compliance (stub) ─────────────────────────────────────────────────────
  # No-op until the first .dump file is committed to abi/ at v0.1.0.
  # See abi/PLACEHOLDER and docs/design/12-library-foundation.md §2.3.
  abi-check:
    name: ABI compliance (stub)
    runs-on: arc-runner-omega
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v6

      - name: Check for ABI baseline
        run: |
          if ls abi/*.dump 2>/dev/null | head -1 | grep -q '\.dump'; then
            echo "ABI baseline found. Install libabigail and run:"
            echo "  abidiff abi/<last-tag>.dump <build>/libomega.so"
          else
            echo "No ABI dump in abi/ yet — stub job. See abi/PLACEHOLDER."
            echo "Baseline is generated when v0.1.0 is tagged."
          fi

  # ── Install smoke test ────────────────────────────────────────────────────────
  install-smoke-test:
    name: Install smoke test
    runs-on: arc-runner-omega
    needs: [filter]
    if: needs.filter.outputs.code == 'true' || github.event_name == 'push'
    env:
      CC: gcc-12
      CXX: g++-12

    steps:
      - uses: actions/checkout@v6

      - name: Cache FetchContent dependencies
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.cache/fetchcontent
          key: fetchcontent-smoke-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: fetchcontent-smoke-

      - name: Build and install Omega
        run: |
          cmake -B build_install \
            -DCMAKE_BUILD_TYPE=Release \
            -DOMEGA_BUILD_TESTS=OFF \
            -DLIBREMIDI_NO_ALSA=ON \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install \
            -DFETCHCONTENT_BASE_DIR=${{ github.workspace }}/.cache/fetchcontent \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -G Ninja
          cmake --build build_install --parallel
          cmake --install build_install

      - name: Build consumer project
        run: |
          cmake -B build_consumer cmake/smoke_test \
            -DCMAKE_PREFIX_PATH=${{ github.workspace }}/install \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -G Ninja
          cmake --build build_consumer --parallel

      - name: Run consumer
        run: ./build_consumer/omega_smoke_test

  # ── Build gate ───────────────────────────────────────────────────────────────
  # Single required status check for branch protection. Always runs so the
  # check name is always present — skipped matrix jobs don't register by their
  # expanded names, which would leave required checks permanently absent.
  build-gate:
    name: Build gate
    if: always()
    needs: [build-and-test, sanitizers, tsan, install-smoke-test]
    runs-on: arc-runner-omega
    steps:
      - name: All build jobs passed or were skipped
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          for r in $results; do
            if [[ "$r" != "success" && "$r" != "skipped" ]]; then
              echo "Job result '$r' is not success or skipped"
              exit 1
            fi
          done

  # ── Coverage ──────────────────────────────────────────────────────────────────
  # Runs on main pushes only; uploads LCOV report to Codecov.
  # Coverage regressions are flagged as warnings on PRs (not hard failures).
  coverage:
    name: Coverage (GCC 12)
    runs-on: arc-runner-omega
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v6

      - name: Cache FetchContent dependencies
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.cache/fetchcontent
          key: fetchcontent-gcc-12-cov-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: fetchcontent-gcc-12-cov-

      - name: Configure with coverage
        env:
          CC: gcc-12
          CXX: g++-12
        run: |
          cmake -B build_cov \
            -DCMAKE_BUILD_TYPE=Debug \
            -DOMEGA_BUILD_TESTS=ON \
            -DLIBREMIDI_NO_ALSA=ON \
            -DCMAKE_CXX_FLAGS="--coverage" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage" \
            -DFETCHCONTENT_BASE_DIR=${{ github.workspace }}/.cache/fetchcontent \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -G Ninja

      - name: Build
        run: cmake --build build_cov --parallel

      - name: Test
        run: ctest --test-dir build_cov --output-on-failure

      - name: Generate coverage report (XML)
        run: |
          gcovr \
            --root . \
            --gcov-executable gcov-12 \
            --exclude-directories '.*_deps.*' \
            --xml coverage.xml \
            --print-summary \
            build_cov

      - name: Upload to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── Benchmarks ────────────────────────────────────────────────────────────────
  # Runs on main pushes only. Results stored as CI artifacts for regression tracking.
  # See docs/design/12-library-foundation.md §4.5 for required benchmarks.
  benchmarks:
    name: Benchmarks (GCC 12)
    runs-on: arc-runner-omega
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      CC: gcc-12
      CXX: g++-12

    steps:
      - uses: actions/checkout@v6

      - name: Cache FetchContent dependencies
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.cache/fetchcontent
          key: fetchcontent-gcc-12-bench-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: fetchcontent-gcc-12-bench-

      - name: Configure
        run: |
          cmake -B build_bench \
            -DCMAKE_BUILD_TYPE=Release \
            -DOMEGA_BUILD_TESTS=ON \
            -DOMEGA_BUILD_BENCHMARKS=ON \
            -DLIBREMIDI_NO_ALSA=ON \
            -DFETCHCONTENT_BASE_DIR=${{ github.workspace }}/.cache/fetchcontent \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -G Ninja

      - name: Build
        run: cmake --build build_bench --parallel

      - name: Run benchmarks
        run: |
          ctest --test-dir build_bench \
            -R "^bench\." \
            --output-on-failure \
            --no-compress-output \
            -T Test

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results-${{ github.sha }}
          path: build_bench/Testing/
